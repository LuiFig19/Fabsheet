<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FabSheet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2A44"/>
      <stop offset="55%" stop-color="#10182C"/>
      <stop offset="100%" stop-color="#0A1929"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#60A5FA"/>
      <stop offset="70%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Rounded square plate -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inset highlight on the top edge for a metallic feel -->
  <rect x="6" y="6" width="500" height="500" rx="106"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Industrial corner brackets - whisper-thin, top-right + bottom-left -->
  <g stroke="rgba(148,189,255,0.22)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 384 92 L 420 92 L 420 128"/>
    <path d="M 92 420 L 92 384"/>
  </g>

  <!-- FS monogram. Slightly oversized + tight letter-spacing for a stamp feel. -->
  <text x="256" y="296" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, system-ui, sans-serif"
        font-weight="800" font-size="232" fill="#ffffff" letter-spacing="-12">FS</text>

  <!-- Bottom accent rule with a soft glow underline -->
  <rect x="172" y="372" width="168" height="10" rx="5" fill="url(#rule)" opacity="0.95"/>
  <rect x="172" y="372" width="168" height="10" rx="5" fill="url(#rule)" opacity="0.35" filter="url(#soft)"/>
</svg>
